# AWS production deploy — manual only until hackathon selection / IDBI infra is ready.
# For the hackathon, publish via Lovable; run this workflow after AWS is provisioned.
name: deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, uat, prod]

permissions:
  id-token: write   # OIDC to AWS
  contents: read

jobs:
  build-and-deploy:
    if: ${{ secrets.AWS_DEPLOY_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      AWS_REGION: ap-south-1
      ENV: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: creditcrew-${{ env.ENV }}
          TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile -t $REGISTRY/$REPO:$TAG .
          docker push $REGISTRY/$REPO:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.5 }

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init
          terraform workspace select ${{ env.ENV }} || terraform workspace new ${{ env.ENV }}
          terraform apply -auto-approve \
            -var-file=envs/${{ env.ENV }}.tfvars \
            -var="app_image_tag=${{ env.IMAGE_TAG }}"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster creditcrew-${{ env.ENV }} \
            --service creditcrew-${{ env.ENV }} \
            --force-new-deployment
