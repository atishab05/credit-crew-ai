# Hackathon CI — verifies the app builds without AWS.
name: ci
on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "**/*.md", "terraform/**"]
  pull_request:
    paths-ignore: ["docs/**", "**/*.md", "terraform/**"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
